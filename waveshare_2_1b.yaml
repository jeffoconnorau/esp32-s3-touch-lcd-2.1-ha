substitutions:
  name: waveshare-esp32-s3-touch-2-1b
  friendly_name: "Waveshare 2.1B Display"

esphome:
  name: ${name}
  friendly_name: ${friendly_name}
  project:
    name: waveshare.esp32_s3_touch_lcd_2_1b
    version: "1.0"

esp32:
  board: esp32s3box
  variant: esp32s3
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_LCD_RGB_ISR_IRAM_SAFE: "y"

psram:
  mode: octal
  speed: 80MHz

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
logger:
  level: INFO

# Define the shared I2C bus used by the Touch controller and the IO Expander
i2c:
  - id: i2c_bus
    sda: 15
    scl: 7
    frequency: 400kHz

# IO Expander for CS, Reset, etc.
pca9554:
  - id: io_expander
    address: 0x20

# Software SPI for ST7701 Initialization
spi:
  - id: spi_init_bus
    clk_pin: 2
    mosi_pin: 1

display:
  - platform: st7701s
    id: disp
    spi_id: spi_init_bus
    dimensions:
      width: 480
      height: 480
    color_order: BGR
    invert_colors: false
    cs_pin:
      pca9554: io_expander
      number: 2
    data_pins:
      red: [46, 3, 8, 18, 17]
      green: [14, 13, 12, 11, 10, 9]
      blue: [5, 45, 48, 47, 21]
    hsync_pin: 38
    vsync_pin: 39
    de_pin: 40
    pclk_pin: 41
    reset_pin:
      pca9554: io_expander
      number: 0
    pclk_frequency: 12MHz
    pclk_inverted: false
    hsync_pulse_width: 8
    hsync_back_porch: 10
    hsync_front_porch: 50
    vsync_pulse_width: 3
    vsync_back_porch: 8
    vsync_front_porch: 8
    update_interval: 16ms
    auto_clear_enabled: false

    init_sequence:
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x10]
      - [0xC0, 0x3B, 0x00]
      - [0xC1, 0x0B, 0x02]
      - [0xC2, 0x07, 0x02]
      - [0xCC, 0x10]
      - [0xCD, 0x08]
      - [0xB0, 0x00, 0x11, 0x16, 0x0E, 0x11, 0x06, 0x05, 0x09, 0x08, 0x21, 0x06, 0x13, 0x10, 0x29, 0x31, 0x18]
      - [0xB1, 0x00, 0x11, 0x16, 0x0E, 0x11, 0x07, 0x05, 0x09, 0x09, 0x21, 0x05, 0x13, 0x11, 0x2A, 0x31, 0x18]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x11]
      - [0xB0, 0x6D]
      - [0xB1, 0x37]
      - [0xB2, 0x81]
      - [0xB3, 0x80]
      - [0xB5, 0x43]
      - [0xB7, 0x85]
      - [0xB8, 0x20]
      - [0xC1, 0x78]
      - [0xC2, 0x78]
      - [0xD0, 0x88]
      - [0xE0, 0x00, 0x00, 0x02]
      - [0xE1, 0x03, 0xA0, 0x00, 0x00, 0x04, 0xA0, 0x00, 0x00, 0x00, 0x20, 0x20]
      - [0xE2, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      - [0xE3, 0x00, 0x00, 0x11, 0x00]
      - [0xE4, 0x22, 0x00]
      - [0xE5, 0x05, 0xEC, 0xA0, 0xA0, 0x07, 0xEE, 0xA0, 0xA0, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      - [0xE6, 0x00, 0x00, 0x11, 0x00]
      - [0xE7, 0x22, 0x00]
      - [0xE8, 0x06, 0xED, 0xA0, 0xA0, 0x08, 0xEF, 0xA0, 0xA0, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00, 0x00]
      - [0xEB, 0x00, 0x00, 0x40, 0x40, 0x00, 0x00, 0x00]
      - [0xED, 0xFF, 0xFF, 0xFF, 0xBA, 0x0A, 0xBF, 0x45, 0xFF, 0xFF, 0x54, 0xFB, 0xA0, 0xAB, 0xFF, 0xFF, 0xFF]
      - [0xEF, 0x10, 0x0D, 0x04, 0x08, 0x3F, 0x1F]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x13]
      - [0xEF, 0x08]
      - [0xFF, 0x77, 0x01, 0x00, 0x00, 0x00]
      - [0x36, 0x00]
      - [0x3A, 0x66]
      - [0x11]
      - [0x21]
      - [0x29]

# Touch component (CST820 usually works with the CST816 driver)
touchscreen:
  - platform: cst816
    id: touch
    display: disp
    reset_pin:
      pca9554: io_expander
      number: 1

# Backlight Control
output:
  - platform: ledc
    id: backlight_pwm
    pin: 6
    frequency: 20000Hz

light:
  - platform: monochromatic
    output: backlight_pwm
    name: "Display Backlight"
    id: backlight
    restore_mode: ALWAYS_ON

# Sensors from Home Assistant
sensor:
  - platform: homeassistant
    id: home_temp
    entity_id: sensor.shellyhtg3_temperature
    internal: true
    on_value:
      - lvgl.label.update:
          id: temp_label
          text: !lambda 'return str_sprintf("%.1f °C", x);'

  - platform: homeassistant
    id: home_humidity
    entity_id: sensor.shellyhtg3_humidity
    internal: true
    on_value:
      - lvgl.label.update:
          id: hum_label
          text: !lambda 'return str_sprintf("%.1f %%", x);'

text_sensor:
  - platform: homeassistant
    id: home_solar_state
    entity_id: sensor.drummers_demand_window
    internal: true
    on_value:
      - lvgl.label.update:
          id: power_label
          text: !lambda 'return x;'

# LVGL setup for the lovely UI
lvgl:
  displays:
    - disp
  touchscreens:
    - touch
  bg_color: 0x1A1A1A
  
  widgets:
    - label:
        text: "Home Status"
        align: TOP_MID
        y: 30
        text_color: 0xFFA500
        text_font: "montserrat_24"
    
    # Temperature Widget
    - obj:
        width: 200
        height: 120
        align: CENTER
        x: -110
        y: -30
        bg_color: 0x2A2A2A
        radius: 12
        widgets:
          - label:
              text: "Temperature"
              align: TOP_MID
              y: 10
              text_color: 0xAAAAAA
          - label:
              id: temp_label
              text: "-- °C"
              align: CENTER
              y: 15
              text_color: 0xFF6B6B
              text_font: "montserrat_36"

    # Humidity Widget
    - obj:
        width: 200
        height: 120
        align: CENTER
        x: 110
        y: -30
        bg_color: 0x2A2A2A
        radius: 12
        widgets:
          - label:
              text: "Humidity"
              align: TOP_MID
              y: 10
              text_color: 0xAAAAAA
          - label:
              id: hum_label
              text: "-- %"
              align: CENTER
              y: 15
              text_color: 0x4DABF7
              text_font: "montserrat_36"

    # Solar/Power Widget
    - obj:
        width: 420
        height: 100
        align: BOTTOM_MID
        y: -40
        bg_color: 0x333333
        radius: 12
        widgets:
          - label:
              text: "Power Recommendation"
              align: TOP_MID
              y: 10
              text_color: 0xAAAAAA
          - label:
              id: power_label
              text: "Waiting for data..."
              align: CENTER
              y: 15
              text_color: 0xFFD43B
              text_font: "montserrat_20"
